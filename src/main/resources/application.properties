spring.datasource.url=jdbc:postgresql://localhost:5432/salon
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
spring.flyway.enabled=true

# JWT secret (override in prod)
app.jwt.secret=${JWT_SECRET:this-is-a-dev-only-secret-key-please-change-in-production-to-a-secure-32-byte-string}

springdoc.api-docs.path=/v3/api-docs

# Notification Configuration
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}

# Mail Configuration (Mailtrap or other SMTP)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@salonbooking.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

